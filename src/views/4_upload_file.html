<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FileShare - Upload & Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
  }
  
  body { 
    font-family: 'Poppins', sans-serif; 
    background: #f0f4f8; 
    min-height: 100vh; 
  }

  .topbar {
    background: #1565c0;
    color: white;
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 16px;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .topbar-left { 
    display: flex; 
    align-items: center; 
    gap: 15px; 
  }
  
  .logo {
    font-size: 20px;
    font-weight: 700;
    background: rgba(255,255,255,0.2);
    padding: 6px 12px;
    border-radius: 8px;
  }
  
  .nav-buttons {
    display: flex;
    gap: 10px;
  }
  
  .nav-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-family: 'Poppins', sans-serif;
    transition: all 0.2s;
  }
  
  .nav-btn.active {
    background: white;
    color: #1565c0;
  }
  
  .nav-btn:hover {
    background: rgba(255,255,255,0.3);
  }
  
  .topbar-icons { 
    display: flex; 
    gap: 16px; 
    font-size: 18px; 
  }
  
  .topbar-icons span {
    cursor: pointer;
    transition: opacity 0.2s;
  }
  
  .topbar-icons span:hover {
    opacity: 0.8;
  }

  .content {
    padding: 30px 24px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* Upload Card */
  .upload-card {
    background: white;
    border-radius: 20px;
    padding: 30px 35px;
    max-width: 560px;
    margin: 0 auto 30px auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }
  
  .dashboard-card {
    background: white;
    border-radius: 20px;
    padding: 25px 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }
  
  .section-title {
    font-size: 20px;
    font-weight: 600;
    color: #1e293b;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-left: 4px solid #1565c0;
    padding-left: 15px;
  }
  
  .form-header {
    margin-bottom: 28px;
    text-align: center;
  }
  
  .form-header h2 {
    font-size: 24px;
    font-weight: 600;
    color: #1e293b;
    margin-bottom: 6px;
  }
  
  .form-header p {
    font-size: 13px;
    color: #64748b;
  }

  .form-row {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
    gap: 14px;
  }

  .form-row label {
    width: 110px;
    font-size: 14px;
    color: #334155;
    font-weight: 500;
  }

  .form-row input,
  .form-row select {
    flex: 1;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'Poppins', sans-serif;
    outline: none;
    transition: all 0.2s;
  }

  .form-row input:focus,
  .form-row select:focus { 
    border-color: #1565c0; 
    box-shadow: 0 0 0 3px rgba(21,101,192,0.1);
  }

  .user-email-section {
    margin-bottom: 20px;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  
  .user-email-section.show {
    display: block;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .user-email-label {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #f8fafc;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid #e2e8f0;
  }
  
  .user-email-label input {
    flex: 1;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
  }

  .file-select-area {
    margin-bottom: 20px;
  }
  
  .file-select-label {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: #f8fafc;
    border: 2px dashed #cbd5e1;
    border-radius: 12px;
    padding: 16px 20px;
    cursor: pointer;
    transition: all 0.25s ease;
    font-weight: 500;
    font-size: 14px;
  }
  
  .file-select-label:hover {
    border-color: #1565c0;
    background: #f0f9ff;
    color: #1565c0;
  }
  
  .file-select-label input {
    display: none;
  }
  
  .file-info {
    margin-top: 12px;
    padding: 10px 14px;
    background: #f1f5f9;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  
  .remove-file-btn {
    background: #fee2e2;
    border: none;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    color: #dc2626;
  }

  .btn-upload {
    width: 100%;
    background: #1565c0;
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
  }
  
  .btn-upload:hover { 
    background: #0d47a1; 
    transform: translateY(-1px);
  }

  /* Dashboard Table */
  .files-table {
    width: 100%;
    border-collapse: collapse;
  }
  
  .files-table th,
  .files-table td {
    padding: 14px 12px;
    text-align: left;
    border-bottom: 1px solid #e2e8f0;
  }
  
  .files-table th {
    background: #f8fafc;
    font-weight: 600;
    color: #475569;
    font-size: 13px;
  }
  
  .files-table td {
    font-size: 14px;
    color: #334155;
  }
  
  .badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  
  .badge-admin { background: #e3f2fd; color: #1565c0; }
  .badge-user { background: #e8f5e9; color: #2e7d32; }
  .badge-all { background: #fff3e0; color: #ef6c00; }
  
  .download-btn {
    background: #e8f0fe;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    color: #1565c0;
    font-family: 'Poppins', sans-serif;
  }
  
  .empty-dashboard {
    text-align: center;
    padding: 40px;
    color: #94a3b8;
  }
  
  .success-message, .error-message {
    border-radius: 10px;
    padding: 12px;
    margin-top: 18px;
    text-align: center;
    display: none;
  }
  
  .success-message.show { display: block; background: #e8f5e9; color: #2e7d32; }
  .error-message.show { display: block; background: #ffebee; color: #c62828; }
  
  @media (max-width: 768px) {
    .content { padding: 20px; }
    .upload-card { padding: 20px; }
    .form-row { flex-direction: column; align-items: stretch; }
    .form-row label { width: auto; }
    .files-table { display: block; overflow-x: auto; }
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">📁 FileShare</div>
    <div class="nav-buttons">
      <button class="nav-btn active" id="uploadTabBtn">📤 Upload</button>
      <button class="nav-btn" id="dashboardTabBtn">📋 Dashboard</button>
    </div>
  </div>
  <div class="topbar-icons">
    <span>🔔</span>
    <span>👤 John</span>
  </div>
</div>

<div class="content">
  <!-- Upload Section -->
  <div id="uploadSection">
    <div class="upload-card">
      <div class="form-header">
        <h2>📎 Upload New File</h2>
        <p>Fill in details, select file, and share</p>
      </div>

      <div class="form-row">
        <label>File Name</label>
        <input type="text" id="fileName" placeholder="e.g., project_report.pdf">
      </div>

      <div class="form-row">
        <label>Description</label>
        <input type="text" id="fileDescription" placeholder="Brief description">
      </div>

      <div class="form-row">
        <label>Share With:</label>
        <select id="shareWith">
          <option value="Admin">Admin</option>
          <option value="User">User</option>
          <option value="All">All</option>
        </select>
      </div>

      <div id="userEmailSection" class="user-email-section">
        <div class="user-email-label">
          <span>👤</span>
          <input type="email" id="userEmail" placeholder="Enter user's email address">
        </div>
        <div class="user-info-hint" style="font-size: 11px; color: #64748b; margin-top: 6px;">
          💡 File will be sent to this email and appear in recipient's dashboard
        </div>
      </div>

      <div class="file-select-area">
        <label class="file-select-label">
          <input type="file" id="fileInput">
          📂 Choose File
        </label>
        <div id="fileInfoContainer" class="file-info">
          <span>📄 No file selected</span>
        </div>
      </div>

      <button class="btn-upload" id="uploadBtn">
        ✈️ Upload & Share
      </button>
      
      <div id="successMessage" class="success-message">✓ File uploaded & shared successfully!</div>
      <div id="errorMessage" class="error-message"></div>
    </div>
  </div>

  <!-- Dashboard Section (Hidden by default) -->
  <div id="dashboardSection" style="display: none;">
    <div class="dashboard-card">
      <div class="section-title">
        <i class="fas fa-tachometer-alt" style="color: #1565c0;"></i>
        <span>My Dashboard - Files Shared With Me</span>
      </div>
      <div id="dashboardContent">
        <!-- Dynamic content will be loaded here -->
      </div>
    </div>
  </div>
</div>

<script>
  // ========== DATA STORAGE ==========
  // Store all shared files (acts as database)
  let sharedFiles = [];
  
  // Current logged-in user (for demo, we'll use a session email)
  // In real app, this would come from authentication
  let currentUserEmail = "john.doe@example.com";
  
  // Load saved data from localStorage
  function loadData() {
    const saved = localStorage.getItem('fileShareSystem');
    if (saved) {
      sharedFiles = JSON.parse(saved);
    } else {
      // Add some demo data
      sharedFiles = [
        {
          id: "demo1",
          fileName: "Annual Report 2024.pdf",
          displayName: "Annual Report 2024",
          description: "Company annual financial report",
          shareWith: "All",
          recipientEmail: null,
          senderName: "Admin Team",
          fileSize: "2.4 MB",
          fileType: "application/pdf",
          timestamp: new Date(Date.now() - 86400000).toLocaleString(),
          fileData: null // In demo, we store metadata only
        },
        {
          id: "demo2",
          fileName: "Project Proposal.docx",
          displayName: "Project Proposal",
          description: "Q1 marketing project proposal",
          shareWith: "User",
          recipientEmail: "john.doe@example.com",
          senderName: "Sarah Manager",
          fileSize: "856 KB",
          fileType: "application/docx",
          timestamp: new Date(Date.now() - 172800000).toLocaleString(),
          fileData: null
        }
      ];
      saveData();
    }
  }
  
  function saveData() {
    localStorage.setItem('fileShareSystem', JSON.stringify(sharedFiles));
  }
  
  // Generate unique ID
  function generateId() {
    return Date.now() + '-' + Math.random().toString(36).substr(2, 9);
  }
  
  // Get files visible to current user
  function getUserFiles() {
    return sharedFiles.filter(file => {
      if (file.shareWith === 'All') return true;
      if (file.shareWith === 'Admin') return false; // Admin only, user can't see
      if (file.shareWith === 'User') {
        return file.recipientEmail && file.recipientEmail.toLowerCase() === currentUserEmail.toLowerCase();
      }
      return false;
    });
  }
  
  // Render Dashboard
  function renderDashboard() {
    const dashboardContent = document.getElementById('dashboardContent');
    const userFiles = getUserFiles();
    
    if (userFiles.length === 0) {
      dashboardContent.innerHTML = `
        <div class="empty-dashboard">
          <i class="fas fa-folder-open" style="font-size: 48px; opacity: 0.5;"></i>
          <p style="margin-top: 16px;">No files shared with you yet.</p>
          <p style="font-size: 12px;">When someone shares a file with your email (${currentUserEmail}), it will appear here.</p>
        </div>
      `;
      return;
    }
    
    dashboardContent.innerHTML = `
      <table class="files-table">
        <thead>
          <tr><th>File Name</th><th>Description</th><th>Shared By</th><th>Size</th><th>Shared On</th><th>Access</th><th>Action</th></tr>
        </thead>
        <tbody>
          ${userFiles.map(file => `
            <tr>
              <td><strong>${escapeHtml(file.displayName || file.fileName)}</strong></td>
              <td>${escapeHtml(file.description || '-')}</td>
              <td>${escapeHtml(file.senderName || 'System')}</td>
              <td>${file.fileSize || 'Unknown'}</td>
              <td style="font-size: 12px;">${file.timestamp}</td>
              <td><span class="badge badge-${file.shareWith === 'All' ? 'all' : 'user'}">${file.shareWith}</span></td>
              <td><button class="download-btn" data-id="${file.id}"><i class="fas fa-download"></i> Download</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
    
    // Add download event listeners
    document.querySelectorAll('.download-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const fileId = btn.getAttribute('data-id');
        downloadFile(fileId);
      });
    });
  }
  
  function downloadFile(fileId) {
    const file = sharedFiles.find(f => f.id === fileId);
    if (file) {
      if (file.fileData) {
        // If we have actual file data (from upload)
        const link = document.createElement('a');
        link.href = file.fileData;
        link.download = file.fileName;
        link.click();
      } else {
        // Demo file - create a text file
        const content = `File: ${file.displayName || file.fileName}\nDescription: ${file.description || 'No description'}\nShared on: ${file.timestamp}\nThis is a demo file content. In production, the actual file would be downloaded.`;
        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = file.fileName.replace(/\.(pdf|docx|txt)$/, '.txt') || 'download.txt';
        link.click();
        URL.revokeObjectURL(url);
      }
      showTemporaryMessage(`Downloading: ${file.displayName || file.fileName}`, 'success');
    }
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  function showTemporaryMessage(msg, type) {
    const msgDiv = type === 'success' ? document.getElementById('successMessage') : document.getElementById('errorMessage');
    if (msgDiv) {
      msgDiv.textContent = msg;
      msgDiv.classList.add('show');
      setTimeout(() => msgDiv.classList.remove('show'), 3000);
    } else {
      alert(msg);
    }
  }
  
  // ========== UPLOAD LOGIC ==========
  let selectedFileObj = null;
  
  const fileNameInput = document.getElementById('fileName');
  const fileDescInput = document.getElementById('fileDescription');
  const shareWithSelect = document.getElementById('shareWith');
  const userEmailSection = document.getElementById('userEmailSection');
  const userEmailInput = document.getElementById('userEmail');
  const fileInput = document.getElementById('fileInput');
  const fileInfoContainer = document.getElementById('fileInfoContainer');
  const uploadBtn = document.getElementById('uploadBtn');
  
  function toggleUserEmailSection() {
    if (shareWithSelect.value === 'User') {
      userEmailSection.classList.add('show');
    } else {
      userEmailSection.classList.remove('show');
      userEmailInput.value = '';
    }
  }
  
  shareWithSelect.addEventListener('change', toggleUserEmailSection);
  
  function formatFileSize(bytes) {
    if (!bytes) return '0 Bytes';
    const k = 1024;
    const sizes = ['Bytes', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
  }
  
  function updateFileInfoDisplay() {
    if (selectedFileObj) {
      fileInfoContainer.innerHTML = `
        <span>📄 ${escapeHtml(selectedFileObj.name)} (${formatFileSize(selectedFileObj.size)})</span>
        <button class="remove-file-btn" id="removeFileBtn">✖ Remove</button>
      `;
      const removeBtn = document.getElementById('removeFileBtn');
      if (removeBtn) removeBtn.addEventListener('click', clearSelectedFile);
      
      if (fileNameInput.value.trim() === '') {
        let baseName = selectedFileObj.name.replace(/\.[^/.]+$/, '');
        fileNameInput.value = baseName;
      }
    } else {
      fileInfoContainer.innerHTML = `<span>📄 No file selected</span>`;
    }
  }
  
  function clearSelectedFile() {
    selectedFileObj = null;
    fileInput.value = '';
    updateFileInfoDisplay();
  }
  
  fileInput.addEventListener('change', function(e) {
    if (e.target.files && e.target.files[0]) {
      selectedFileObj = e.target.files[0];
      if (selectedFileObj.size > 50 * 1024 * 1024) {
        alert('File too large (>50MB)');
        clearSelectedFile();
        return;
      }
      updateFileInfoDisplay();
    } else {
      clearSelectedFile();
    }
  });
  
  // Read file as data URL for storage
  function readFileAsDataURL(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
  
  // Send email simulation (also adds to dashboard)
  async function sendEmailNotification(recipientEmail, fileMetadata) {
    return new Promise((resolve) => {
      setTimeout(() => {
        console.log(`📧 EMAIL SENT to ${recipientEmail}`);
        console.log(`Subject: ${fileMetadata.displayName} has been shared with you`);
        console.log(`Body: A file has been shared. Login to dashboard to view.`);
        resolve(true);
      }, 300);
    });
  }
  
  async function performUpload() {
    // Validation
    if (!selectedFileObj) {
      showTemporaryMessage('Please select a file to upload', 'error');
      return;
    }
    const displayName = fileNameInput.value.trim();
    if (!displayName) {
      showTemporaryMessage('Please enter a file name', 'error');
      return;
    }
    
    const shareWith = shareWithSelect.value;
    let recipientEmail = null;
    if (shareWith === 'User') {
      recipientEmail = userEmailInput.value.trim();
      if (!recipientEmail) {
        showTemporaryMessage('Please enter recipient email', 'error');
        return;
      }
      const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
      if (!emailRegex.test(recipientEmail)) {
        showTemporaryMessage('Please enter a valid email address', 'error');
        return;
      }
    }
    
    uploadBtn.disabled = true;
    uploadBtn.innerHTML = '⏳ Processing...';
    
    try {
      const fileDataURL = await readFileAsDataURL(selectedFileObj);
      const newFile = {
        id: generateId(),
        fileName: selectedFileObj.name,
        displayName: displayName,
        description: fileDescInput.value.trim() || 'No description',
        shareWith: shareWith,
        recipientEmail: recipientEmail,
        senderName: currentUserEmail,
        fileSize: formatFileSize(selectedFileObj.size),
        fileType: selectedFileObj.type,
        timestamp: new Date().toLocaleString(),
        fileData: fileDataURL
      };
      
      sharedFiles.push(newFile);
      saveData();
      
      // Send email notification if sharing with User
      if (shareWith === 'User' && recipientEmail) {
        await sendEmailNotification(recipientEmail, newFile);
        showTemporaryMessage(`✓ File "${displayName}" uploaded and sent to ${recipientEmail}!`, 'success');
      } else if (shareWith === 'All') {
        showTemporaryMessage(`✓ File "${displayName}" uploaded and shared with Everyone!`, 'success');
      } else {
        showTemporaryMessage(`✓ File "${displayName}" uploaded and shared with Admin!`, 'success');
      }
      
      // If the current user is the recipient OR All, dashboard will show it
      // Also if sharing with All, current user can see it
      if ((shareWith === 'User' && recipientEmail === currentUserEmail) || shareWith === 'All') {
        // Refresh dashboard if visible
        if (document.getElementById('dashboardSection').style.display !== 'none') {
          renderDashboard();
        }
      }
      
      // Reset form after successful upload (optional)
      setTimeout(() => {
        if (confirm('Upload successful! Clear form for another upload?')) {
          resetForm();
        } else {
          clearSelectedFile();
        }
      }, 200);
      
    } catch (err) {
      console.error(err);
      showTemporaryMessage('Upload failed: ' + err.message, 'error');
    } finally {
      uploadBtn.disabled = false;
      uploadBtn.innerHTML = '✈️ Upload & Share';
    }
  }
  
  function resetForm() {
    fileNameInput.value = '';
    fileDescInput.value = '';
    shareWithSelect.value = 'Admin';
    userEmailInput.value = '';
    toggleUserEmailSection();
    clearSelectedFile();
  }
  
  uploadBtn.addEventListener('click', performUpload);
  
  // Drag & drop
  const dropArea = document.querySelector('.file-select-area');
  if (dropArea) {
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => {
      dropArea.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); });
    });
    dropArea.addEventListener('dragover', () => {
      document.querySelector('.file-select-label').style.background = '#e6f0ff';
    });
    dropArea.addEventListener('dragleave', () => {
      document.querySelector('.file-select-label').style.background = '';
    });
    dropArea.addEventListener('drop', (e) => {
      document.querySelector('.file-select-label').style.background = '';
      const files = e.dataTransfer.files;
      if (files && files[0]) {
        selectedFileObj = files[0];
        fileInput.files = files;
        updateFileInfoDisplay();
      }
    });
  }
  
  // ========== TAB SWITCHING ==========
  const uploadTabBtn = document.getElementById('uploadTabBtn');
  const dashboardTabBtn = document.getElementById('dashboardTabBtn');
  const uploadSection = document.getElementById('uploadSection');
  const dashboardSection = document.getElementById('dashboardSection');
  
  function switchToUpload() {
    uploadSection.style.display = 'block';
    dashboardSection.style.display = 'none';
    uploadTabBtn.classList.add('active');
    dashboardTabBtn.classList.remove('active');
  }
  
  function switchToDashboard() {
    uploadSection.style.display = 'none';
    dashboardSection.style.display = 'block';
    dashboardTabBtn.classList.add('active');
    uploadTabBtn.classList.remove('active');
    renderDashboard();
  }
  
  uploadTabBtn.addEventListener('click', switchToUpload);
  dashboardTabBtn.addEventListener('click', switchToDashboard);
  
  // Initialize
  loadData();
  toggleUserEmailSection();
  
  // Set current user email display (can be changed for demo)
  console.log('Current user:', currentUserEmail);
  
  // Add a small user switcher for demo purposes (hidden feature)
  const userIcon = document.querySelector('.topbar-icons span:last-child');
  if (userIcon) {
    userIcon.style.cursor = 'pointer';
    userIcon.addEventListener('dblclick', () => {
      const newEmail = prompt('Switch user email (for demo):', currentUserEmail);
      if (newEmail && newEmail.includes('@')) {
        currentUserEmail = newEmail;
        alert(`Switched to: ${currentUserEmail}\nDashboard will update accordingly.`);
        if (dashboardSection.style.display !== 'none') renderDashboard();
      }
    });
  }
</script>
</body>
</html>
